server:
  listen: ":443"
  tls_cert: ""
  tls_key: ""
  read_timeout: 30s
  write_timeout: 30s
  max_body_size: "10MB"

logging:
  level: "info"
  format: "json"

metrics:
  listen: ":9191"
  enabled: true

backends:
  # Single endpoint (string) or multiple endpoints (list) per backend.
  celestia_app_rpc: "http://127.0.0.1:26657"
  celestia_node_rpc: "http://127.0.0.1:26658"
  health_check_interval: 30s

  # Multiple endpoints example (round-robin load balancing):
  # celestia_app_rpc:
  #   - "http://app-node-1:26657"
  #   - "http://app-node-2:26657"
  # celestia_node_rpc:
  #   - "http://da-node-1:26658"
  #   - "http://da-node-2:26658"

  # Archival nodes for historical queries (optional):
  # celestia_app_archival_rpc: "http://app-archive:26657"
  # celestia_node_archival_rpc: "http://da-archive:26658"
  # pruning_window: 100000

tokens:
  - token: "1836edb755cdff631a3463cee9b7b12268ded282"
    name: "my-service"
    enabled: true
    rate_limit: 0
    allowed_methods: []

cache:
  enabled: true
  redis_url: "redis://redis:6379/0"
  ttl: 336h              # 14 days
  max_entry_size: "5MB"

admin:
  listen: ":8080"
  username: "admin"
  password_hash: "$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy"
  cors_origins:
    - "http://localhost:3000"
  log_buffer_size: 100000
  log_retention_days: 30
  log_db_path: "/data/da-proxy/logs.db"
