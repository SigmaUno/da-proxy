## Fluent Bit configuration for DA-Proxy log shipping.
##
## DA-Proxy outputs structured JSON to stdout, which Fluent Bit reads
## and forwards to one or more destinations. This configuration supports
## both Loki and CloudWatch outputs.
##
## Key log fields: level, ts, msg, request_id, token_name, method,
## backend, status_code, latency_ms, request_bytes, response_bytes,
## client_ip, path

[SERVICE]
    Flush        5
    Log_Level    info
    Daemon       off
    Parsers_File parsers.conf

## -- Input: read container stdout --
[INPUT]
    Name         tail
    Path         /var/log/containers/da-proxy*.log
    Parser       docker
    Tag          da-proxy.*
    Refresh_Interval 10
    Mem_Buf_Limit    5MB

## -- Filter: parse JSON body --
[FILTER]
    Name         parser
    Match        da-proxy.*
    Key_Name     log
    Parser       json

## -- Output: Grafana Loki --
[OUTPUT]
    Name         loki
    Match        da-proxy.*
    Host         loki
    Port         3100
    Labels       app=da-proxy
    Label_Keys   $level,$method,$backend
    Remove_Keys  ts
    Line_Format  json

