services:
  da-proxy:
    image: ghcr.io/sigmauno/da-proxy:${DA_PROXY_VERSION:-latest}
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
    ports:
      - "443:443"       # HTTPS / JSON-RPC proxy
      - "8080:8080"     # Admin API
      - "9090:9090"     # gRPC proxy
      - "9191:9191"     # Prometheus metrics
      - "26656:26656"   # TCP/P2P proxy
    volumes:
      - ./configs:/etc/da-proxy:ro
      - proxy-data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9191/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  proxy-data:
  redis-data:
